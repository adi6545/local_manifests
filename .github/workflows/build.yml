name: Build PixelOS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Crave
        run: |
          # Create correct config directory
          mkdir -p ~/.config/crave
          echo "${{ secrets.CRAVE_CONF }}" > ~/.config/crave/crave.conf
          echo "${{ secrets.CRAVE_CONF }}" > ~/.crave.conf

          # Download and set up Crave CLI
          curl -sL https://raw.githubusercontent.com/accupara/crave/master/get_crave.sh | bash
          chmod +x crave 2>/dev/null || chmod +x devspace 2>/dev/null || true
          sudo mv crave /usr/local/bin/ 2>/dev/null || sudo mv devspace /usr/local/bin/crave 2>/dev/null || true

      - name: Build PixelOS
        run: |
          crave run --no-patch --clean -- "
          set -e

          mkdir -p PixelOS
          cd PixelOS

          repo init -u https://github.com/PixelOS-AOSP/android_manifest.git -b sixteen --git-lfs

          rm -rf .repo/local_manifests
          git clone https://github.com/adi6545/local_manifests.git .repo/local_manifests

          /opt/crave/resync.sh

          export BUILD_USERNAME=adi6545
          export BUILD_HOSTNAME=crave
          export TZ=Asia/Kolkata

          source build/envsetup.sh

          lunch pixelos_fogos-userdebug

          m bacon
          "
          
