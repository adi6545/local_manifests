name: Crave ROM Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Crave CLI
        run: |
          mkdir -p ~/.config/crave
          echo "${{ secrets.CRAVE_CONF }}" > ~/.config/crave/crave.conf
          
          # Download Crave binary explicitly
          curl -sL https://raw.githubusercontent.com/accupara/crave/main/get_crave.sh | bash
          
          # Ensure execution permissions and move to binary path
          chmod +x crave || chmod +x devspace || true
          sudo mv crave /usr/local/bin/ 2>/dev/null || sudo mv devspace /usr/local/bin/crave 2>/dev/null || true
          
          # Verify installation
          which crave || echo "Crave binary missing!"

      - name: DevSpace / Build Execution
        run: |
          crave run --no-patch -- "
            repo init -u https://github.com/PixelOS-AOSP/manifest.git -b fifteen --git-lfs
            crave pull .repo/local_manifests/
            repo sync -c -j\$(nproc --all) --force-sync --no-clone-bundle --no-tags
            source build/envsetup.sh
            lunch pixelos_fogos-userdebug
            mka bacon
          "
          
