name: Crave ROM Build

on:
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Crave CLI
        run: |
          mkdir -p ~/.config/crave
          echo "${{ secrets.CRAVE_CONF }}" > ~/.config/crave/crave.conf
          curl -s https://raw.githubusercontent.com/accupara/crave/main/get_crave.sh | bash
          sudo mv crave /usr/local/bin/

      - name: DevSpace / Build Execution
        run: |
          # Pull workspace and run build on Crave
          crave run --no-patch -- "
            repo init -u https://github.com/PixelOS-AOSP/manifest.git -b fifteen --git-lfs
            crave pull .repo/local_manifests/
            repo sync -c -j\$(nproc --all) --force-sync --no-clone-bundle --no-tags
            source build/envsetup.sh
            lunch pixelos_fogos-userdebug
            mka bacon
          "
